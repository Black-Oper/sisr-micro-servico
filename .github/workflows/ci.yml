name: CI/CD

# Roda os testes a cada push na main e em todo Pull Request.
# Em push na main, se os testes passarem, faz o deploy na VM.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------- orchestrator (Java / Spring Boot) ----------------
  orchestrator:
    name: orchestrator (Java 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configura o JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      # O runner ubuntu-latest já vem com Docker → os testes de integração
      # (Testcontainers) sobem Redis/MinIO/RabbitMQ reais sem passo extra.
      - name: Testes
        working-directory: orchestrator
        run: ./mvnw -B -ntp test

  # ---------------- worker (Python 3.9) ----------------
  worker:
    name: worker (Python 3.9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configura o Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
          cache-dependency-path: worker/requirements-dev.txt
      - name: Instala dependências de teste
        working-directory: worker
        run: pip install -r requirements-dev.txt
      # Sem torch/pesos no CI: o teste do modelo real se pula sozinho.
      - name: Testes
        working-directory: worker
        run: pytest -q

  # ---------------- frontend (Next.js) ----------------
  frontend:
    name: frontend (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configura o Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instala dependências
        working-directory: frontend
        run: npm ci
      - name: Testes
        working-directory: frontend
        run: npm test
      - name: Build de produção
        working-directory: frontend
        run: npm run build

  # ---------------- deploy (Oracle VM) ----------------
  # Só roda em push na main e depois que os 3 jobs de teste passarem.
  # Entra na VM por SSH, atualiza o código e sobe os containers.
  deploy:
    name: deploy (Oracle VM)
    needs: [orchestrator, worker, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ~/sisr-microservico
            git pull --ff-only
            docker compose up -d --build
            docker image prune -f

