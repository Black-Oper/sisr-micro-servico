# Configuração do orchestrator. Valores vêm do ambiente (Seção 8 do CLAUDE.md);
# os defaults abaixo servem para rodar localmente fora do Docker.
spring:
  application:
    name: orchestrator
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_SIZE:10MB}
      max-request-size: ${MAX_UPLOAD_SIZE:10MB}

server:
  port: ${SERVER_PORT:8080}

minio:
  endpoint: ${MINIO_ENDPOINT:localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  secure: ${MINIO_SECURE:false}
  bucket-input: ${MINIO_BUCKET_INPUT:sisr-inputs}
  bucket-output: ${MINIO_BUCKET_OUTPUT:sisr-outputs}

redis:
  job-ttl: ${REDIS_JOB_TTL:86400}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
